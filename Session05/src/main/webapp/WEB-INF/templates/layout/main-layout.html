<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - Nhà hàng">Nhà hàng</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: #333; color: #fff; padding: 16px 24px; display: flex; align-items: center; }
        header .logo { font-size: 22px; font-weight: bold; }
        header nav { margin-left: 30px; }
        header nav a { color: #ddd; text-decoration: none; margin-right: 16px; }
        header nav a:hover { color: #fff; }
        main { flex: 1; padding: 24px; }
        footer { background: #f5f5f5; border-top: 1px solid #ddd; padding: 16px 24px; text-align: center; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <!-- ========== HEADER (chung cho mọi trang) ========== -->
    <header>
        <div class="logo">🍽️ NHÀ HÀNG</div>
        <nav>
            <a th:href="@{/bai4/dishes}">Thực đơn</a>
            <a th:href="@{/bai5/smart-order}">Đặt món</a>
        </nav>
    </header>

    <!-- ========== NỘI DUNG THAY ĐỔI ========== -->
    <main layout:fragment="content">
        <p>Nội dung mặc định (sẽ bị thay thế bởi trang con).</p>
    </main>

    <!-- ========== FOOTER (chung cho mọi trang) ========== -->
    <footer>
        <p>📍 Địa chỉ: 123 Đường Nguyễn Huệ, TP.HCM | ☎ Hotline: 0901-234-567</p>
        <p>© 2026 Nhà hàng. All rights reserved.</p>
    </footer>
</body>
</html>
