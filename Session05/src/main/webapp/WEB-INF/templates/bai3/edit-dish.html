<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bài 3 – Chỉnh sửa món ăn</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 500px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        .checkbox-group { margin-top: 12px; }
        .checkbox-group label { display: inline; font-weight: normal; margin-left: 6px; }
        .btn-group { margin-top: 20px; }
        button { padding: 8px 20px; background: #4CAF50; color: #fff; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #388E3C; }
        a.btn-back { text-decoration: none; margin-left: 10px; color: #2196F3; }
    </style>
</head>
<body>
    <h1>Chỉnh sửa món ăn</h1>

    <!-- form dùng th:object để binding đối tượng Dish -->
    <!-- Action dùng Literal substitution @{|...|} để tạo đường dẫn động có chứa ID -->
    <form th:action="@{|/bai3/edit/${dish.id}|}" th:object="${dish}" method="post">

        <label for="id">ID:</label>
        <input type="text" id="id" th:field="*{id}" readonly="readonly" value="1"/>

        <label for="name">Tên món:</label>
        <input type="text" id="name" th:field="*{name}" value="Cá hồi nướng"/>

        <label for="price">Giá (VNĐ):</label>
        <input type="number" id="price" th:field="*{price}" step="1000" value="150000"/>

        <div class="checkbox-group">
            <input type="checkbox" id="available" th:field="*{available}" checked="checked"/>
            <label for="available">Còn hàng</label>
        </div>

        <div class="btn-group">
            <button type="submit">Lưu thay đổi</button>
            <a class="btn-back" th:href="@{/bai3/dishes}">← Quay lại danh sách</a>
        </div>
    </form>
</body>
</html>
